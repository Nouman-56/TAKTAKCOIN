<button id="chromeTestBtn" style="position: fixed; bottom: 20px; right: 20px; background: #4285f4; color: white; padding: 12px 20px; border-radius: 30px; border: none; z-index: 9999; font-weight: bold;">
    🔗 Open in Chrome
</button>

<script>
    document.getElementById('chromeTestBtn').addEventListener('click', function() {
        // Yeh link Google Chrome ya default browser mein khulega
        window.open("https://www.google.com", "_blank");
        alert("✅ Link open kar diya! Check karo: Konsa browser khula?");
    });
</script>
