        async function processReferralBonus(referrerId, referredUserId) {

        async function checkAndUnlockReferralBonus(userId, totalTaps) {
            try {
                const bonusesQuery = query(collection(db, "referralBonuses"), where("referredUserId", "==", userId), where("status", "==", "active"));
                const snapshot = await getDocs(bonusesQuery);
                snapshot.forEach(async (docSnap) => {
                    const bonus = docSnap.data();
                    const tapsSinceLastUnlock = totalTaps - (bonus.lastUnlockAt || 0);
                    if (tapsSinceLastUnlock >= UNLOCK_PER_TAPS) {
                        const unlockCount = Math.floor(tapsSinceLastUnlock / UNLOCK_PER_TAPS);

                                const newLocked = bonus.lockedAmount - amountToUnlock;

        function showActionPopup(message, type = 'success') { const popup = document.createElement('div'); popup.className = 'action-popup'; if (type === 'like') { popup.classList.add('like-popup'); popup.innerHTML = `<i class="fas fa-heart"></i> <span>${message}</span>`; } else if (type === 'follow') { popup.classList.add('follow-popup'); popup.innerHTML = `<i class="fas fa-user-plus"></i> <span>${message}</span>`; } else if (type === 'unfollow') { popup.classList.add('unfollow-popup'); popup.innerHTML = `<i class="fas fa-user-minus"></i> <span>${message}</span>`; } else if (type === 'unlike') { popup.classList.add('unfollow-popup'); popup.innerHTML = `<i class="fas fa-heart-broken"></i> <span>${message}</span>`; } else { popup.innerHTML = `<i class="fas fa-check-circle"></i> <span>${message}</span>`; } document.body.appendChild(popup); setTimeout(() => { popup.classList.add('fade-out'); setTimeout(() => popup.remove(), 300); }, 2800); }

        // FIX 1: Professional Forgot Password Modal

                <div class="forgot-password-modal">

                        </div>

                </div>
            `;

            const sendBtn = document.getElementById('sendResetBtn'); 
            const showStatus = (message, isSuccess) => { 
                statusMsg.className = `status-message ${isSuccess ? 'success' : 'error'}`; 
                statusMsg.innerHTML = isSuccess ? `<i class="fas fa-check-circle"></i> ${message}` : `<i class="fas fa-exclamation-circle"></i> ${message}`; 
                setTimeout(() => { statusMsg.style.display = 'none'; }, 4000); 
            }; 
            sendBtn.addEventListener('click', async () => { 
                const email = emailInput.value.trim(); 
                if (!email) { emailInput.classList.add('error'); showStatus('Please enter your email address', false); setTimeout(() => emailInput.classList.remove('error'), 500); return; } 
                if (!isValidEmail(email)) { emailInput.classList.add('error'); showStatus('Please enter a valid email address', false); setTimeout(() => emailInput.classList.remove('error'), 500); return; }

                    sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link'; 
                }

        function isValidEmail(email) { const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; return emailRegex.test(email); }
        async function giveRewardToUser(targetUserId, actionType, actorUsername) { if (!targetUserId || targetUserId === currentUser?.uid) return; try { const userRef = doc(db, "users", targetUserId); await updateDoc(userRef, { takcoin: increment(1) }); showActionPopup(`✨ +1 TAKCOIN from ${actorUsername} (${actionType})!`, 'success'); await addDoc(collection(db, "rewardHistory"), { userId: targetUserId, fromUserId: currentUser.uid, fromUsername: actorUsername, actionType: actionType, reward: 1, timestamp: serverTimestamp() }); } catch (error) { console.error("Error giving reward:", error); } }

        function loadLeaderboard() {
            if (leaderboardUnsubscribe) leaderboardUnsubscribe();
            const usersRef = collection(db, "users");
            const leaderboardQuery = query(usersRef, orderBy("takcoin", "desc"), limit(50));
            
            leaderboardUnsubscribe = onSnapshot(leaderboardQuery, (snapshot) => {
                const leaderboardBody = document.getElementById('leaderboardBody');
                if (!leaderboardBody) return;
                
                if (snapshot.empty) {
                    leaderboardBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px;">No users yet</td></tr>';
                    return;
                }
                
                const users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                users.sort((a, b) => (b.takcoin || 0) - (a.takcoin || 0));
                
                leaderboardBody.innerHTML = users.map((user, index) => {
                    const rank = index + 1;
                    let rankClass = '';
                    let rankIcon = '';
                    
                    if (rank === 1) { rankClass = 'rank-1-row'; rankIcon = '<i class="fas fa-crown rank-1-icon"></i>'; }
                    else if (rank === 2) { rankClass = 'rank-2-row'; rankIcon = '<i class="fas fa-medal rank-2-icon"></i>'; }
                    else if (rank === 3) { rankClass = 'rank-3-row'; rankIcon = '<i class="fas fa-medal rank-3-icon"></i>'; }
                    
                    const isCurrentUser = currentUser && user.id === currentUser.uid;
                    const rowClass = isCurrentUser ? 'current-user-row' : rankClass;
                    
                    return `
                        <tr class="${rowClass}">
                            <td class="rank-cell">${rankIcon}${rank}</td>
                            <td>
                                <div class="user-cell">
                                    <div class="user-avatar">${(user.username || 'U').charAt(0).toUpperCase()}</div>
                                    <span>${user.username || 'Unknown'} ${isCurrentUser ? '<span style="color:#f39c12;">(You)</span>' : ''}</span>
                                </div>
                            </td>
                            <td class="coins-cell"><i class="fas fa-coins" style="margin-right:5px;"></i>${Math.floor(user.takcoin || 0).toLocaleString()}</td>
                            <td class="taps-cell"><i class="fas fa-hand-fist"></i> ${(user.totalTaps || 0).toLocaleString()}</td>
                        </tr>
                    `;
                }).join('');
            }, (error) => { console.error("Leaderboard error:", error); });
        }

                    <div class="glass-card" style="flex: 2; min-width: 320px; display: flex; flex-direction: column; height: 550px;"><div style="padding: 20px; border-bottom: 1px solid rgba(243,156,18,0.2);"><h3><i class="fas fa-comments" style="color: #f39c12;"></i> TAK COMMUNITY LIVE CHAT</h3></div><div id="chatMessages" style="flex: 1; overflow-y: auto; padding: 20px;"><div style="text-align: center; color: #888;">Loading messages...</div></div><div style="padding: 20px; border-top: 1px solid rgba(243,156,18,0.2); display: flex; gap: 10px;"><input type="text" id="chatInput" class="input-modern" placeholder="Type your message..." style="flex: 1;"><button id="sendMessageBtn" class="btn-primary">Send</button></div><div style="padding: 0 20px 20px 20px; text-align: center;"><small>💡 Click any username to view profile and send gifts!</small></div></div>
                </div>
                
                <!-- LEADERBOARD SECTION -->
                <div class="leaderboard-section">
                    <div class="leaderboard-header">
                        <h2><i class="fas fa-trophy"></i> LIVE LEADERBOARD <i class="fas fa-trophy"></i></h2>
                        <p style="color:#aaa; font-size:14px; margin-top:5px;">Top 50 Champions • Real-time Updates</p>
                    </div>
                    <div class="leaderboard-container">
                        <table class="leaderboard-table">
                            <thead>
                                <tr><th>#</th><th>CHAMPION</th><th>TAKCOINS</th><th>TAPS</th></tr>
                            </thead>
                            <tbody id="leaderboardBody">
                                <tr><td colspan="4" class="leaderboard-loading"><i class="fas fa-spinner fa-spin"></i> Loading leaderboard...</td></tr>
                            </tbody>
                        </table>
                        <div class="leaderboard-footer"><i class="fas fa-chart-line"></i> Rankings update live • Keep tapping to climb!</div>
                    </div>
                </div>
                
                <div style="margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;"><div id="giftBox" class="gift-box" style="cursor: pointer;"><i class="fas fa-gift" style="font-size: 48px; margin-bottom: 10px;"></i><h3 style="color: #fff;">Daily Gift Box</h3><p style="color: #ffe0b3;">Claim your daily reward!</p><div id="giftTimer" class="timer-text" style="margin-top: 10px;"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div><button id="buyCoinBtn" class="btn-primary" style="width: 100%; padding: 15px;"><i class="fas fa-shopping-cart"></i> Purchase TAKCOIN</button></div>
                <div style="margin-top: 30px; text-align: right;"><button id="logoutButton" class="btn-secondary">Logout</button></div>
            </div>`;
            init3DCoin();
            document.getElementById('giftBox').addEventListener('click', handleGiftBoxClick);
            startGiftTimer();
            document.getElementById('referralInfoIcon').addEventListener('click', showReferralRules);
            const notifRef = ref(rtdb, `notifications/${currentUser.uid}`); 
            onValue(notifRef, (snapshot) => { 
                const data = snapshot.val(); 
                const badge = document.getElementById('notifBadge'); 
                if (data) { 
                    const unreadCount = Object.values(data).filter(n => !n.read).length; 
                    if (badge) { 
                        if (unreadCount > 0) { 
                            badge.style.display = 'inline-block'; 
                            badge.textContent = unreadCount > 9 ? '9+' : unreadCount; 
                        } else { 
                            badge.style.display = 'none'; 
                        } 
                    } 
                } else { 
                    if (badge) badge.style.display = 'none'; 
                } 
            });
            document.getElementById('notificationsBell').addEventListener('click', showNotificationsPanel);
            loadLeaderboard();
            const chatQuery = query(collection(db, "chatMessages"), orderBy("timestamp", "desc")); onSnapshot(chatQuery, (snapshot) => { const messages = []; snapshot.forEach(doc => messages.unshift({ id: doc.id, ...doc.data() })); const chatArea = document.getElementById('chatMessages'); if(chatArea){ chatArea.innerHTML = messages.slice(-50).map(msg => `<div class="chat-message"><div style="display: flex; justify-content: space-between; margin-bottom: 5px;"><span class="username-click" data-user="${msg.username}" style="cursor: pointer;"><i class="fas fa-user-circle"></i> ${msg.username}</span><span style="font-size: 11px; color: #888;">${msg.time || new Date(msg.timestamp?.toDate()).toLocaleTimeString()}</span></div><div style="color: #ddd;">${escapeHtml(msg.message)}</div></div>`).join(''); document.querySelectorAll('.username-click').forEach(el => el.addEventListener('click', () => showUserProfile(el.dataset.user))); chatArea.scrollTop = chatArea.scrollHeight; } });
            document.getElementById('tapButton').addEventListener('click', handleTap);
            document.getElementById('withdrawButton').addEventListener('click', showWithdrawalModal);
            document.getElementById('sendMessageBtn').addEventListener('click', async () => { const input = document.getElementById('chatInput'); const message = input.value.trim(); if(!message) return; await addDoc(collection(db, "chatMessages"), { userId: currentUser.uid, username: currentUserData.username, message: message, time: new Date().toLocaleTimeString(), timestamp: serverTimestamp() }); input.value = ''; });
            document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') document.getElementById('sendMessageBtn').click(); });
            document.getElementById('logoutButton').addEventListener('click', () => { auth.signOut(); currentUser = null; currentUserData = null; if(giftTimerInterval) clearInterval(giftTimerInterval); if(userDataUnsubscribe) { userDataUnsubscribe(); userDataUnsubscribe = null; } if(notificationUnsubscribe) { notificationUnsubscribe(); notificationUnsubscribe = null; } if(leaderboardUnsubscribe) { leaderboardUnsubscribe(); leaderboardUnsubscribe = null; } renderAuth(); });
            document.getElementById('profileBtn').addEventListener('click', () => showUserProfile(currentUserData.username));
            document.getElementById('historyButton').addEventListener('click', showTapHistoryModal);
            document.getElementById('buyCoinBtn').addEventListener('click', showPurchaseModal);
            if (currentUser && !userDataUnsubscribe) { setupUserDataListener(currentUser.uid); setupRealtimeNotificationListener(currentUser.uid); setupWithdrawalRefundListener(currentUser.uid); }
        }

        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function toggleLoginPassword() { const pwd = document.getElementById('loginPassword'); const icon = document.getElementById('loginPasswordToggle'); if(loginPasswordVisible){ pwd.type='password'; icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); } else { pwd.type='text'; icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); } loginPasswordVisible = !loginPasswordVisible; }
        function toggleSignupPassword() { const pwd = document.getElementById('signupPassword'); const icon = document.getElementById('signupPasswordToggle'); if(signupPasswordVisible){ pwd.type='password'; icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); } else { pwd.type='text'; icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); } signupPasswordVisible = !signupPasswordVisible; }
        
        function renderAuth() {
            const app = document.getElementById('app');
            app.innerHTML = `<div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;"><div class="glass-card" style="width: 100%; max-width: 450px; padding: 40px;"><div style="text-align: center; margin-bottom: 30px;"><i class="fas fa-crown" style="font-size: 60px; color: #f39c12;"></i><h1 style="font-size: 36px; margin-top: 10px; background: linear-gradient(135deg, #f39c12, #e67e22); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">TAKTAK</h1><p class="animated-text" style="font-size: 14px; margin-top: 5px;">Connect with others, tap for fun, and share gifts 💬🎁</p></div><div class="login-options"><div class="login-tab active" id="loginTab">LOGIN</div><div class="login-tab" id="signupTab">SIGN UP</div></div><div id="loginForm"><div class="input-group" style="margin-bottom: 15px;"><input type="text" id="loginUsername" class="input-modern" placeholder="Username" style="margin-bottom: 15px;"></div><div class="input-group" style="margin-bottom: 15px; position: relative;"><input type="password" id="loginPassword" class="input-modern" placeholder="Password"><i class="fas fa-eye password-toggle" id="loginPasswordToggle" style="position: absolute; right: 15px; top: 15px; cursor: pointer;"></i></div><div class="forgot-link" id="forgotPasswordLink">Forgot Password?</div><button id="loginBtn" class="btn-primary" style="width: 100%;">Login</button><div class="already-user">Don't have an account? <a href="#" id="switchToSignup">Sign up</a></div></div><div id="signupForm" style="display: none;"><div class="input-group" style="margin-bottom: 15px;"><input type="text" id="signupUsername" class="input-modern" placeholder="Username (no spaces)"><div class="error-message" id="usernameErrorMsg"></div></div><div class="input-group" style="margin-bottom: 15px;"><input type="email" id="signupEmail" class="input-modern" placeholder="Email Address" style="margin-bottom: 15px;"><div class="error-message" id="emailErrorMsg"></div></div><div class="input-group" style="margin-bottom: 15px; position: relative;"><input type="password" id="signupPassword" class="input-modern" placeholder="Password (min 6 characters)"><i class="fas fa-eye password-toggle" id="signupPasswordToggle" style="position: absolute; right: 15px; top: 15px; cursor: pointer;"></i></div><div class="input-group" style="margin-bottom: 15px;"><input type="password" id="signupRepeat" class="input-modern" placeholder="Repeat Password"></div><div class="input-group" style="margin-bottom: 15px;"><input type="text" id="referralCode" class="input-modern" placeholder="Referral Code (Optional)"><div class="error-message" id="referralErrorMsg"></div></div><div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;"><input type="checkbox" id="termsCheck" style="width: 18px; height: 18px;"><label style="color: #ddd;">I have read and agree to the <span id="highlightPrivacy" style="color: #f39c12; font-weight: bold; text-decoration: underline; cursor: pointer;">Terms & Conditions</span> and <span id="highlightPolicy" style="color: #f39c12; font-weight: bold; text-decoration: underline; cursor: pointer;">Privacy Policy</span></label><button id="viewTerms" class="btn-secondary" style="padding: 5px 15px; margin-left: auto;">View Full</button></div><button id="signupBtn" class="btn-primary" style="width: 100%;">Create Account</button><div class="already-user">Already have an account? <a href="#" id="switchToLogin">Login</a></div></div><div class="auth-footer"><div class="copyright-text">TAKTAK All Rights Reserved</div><div class="company-logo">TapNex Technologies</div><div class="tagline-text">Innovating the future of digital rewards</div></div></div></div>`;
            function showError(inputId, message) { const input = document.getElementById(inputId); if(!input) return; input.classList.add('input-error'); const errorDiv = document.createElement('div'); errorDiv.className = 'error-message'; errorDiv.style.display = 'block'; errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`; input.parentElement?.appendChild(errorDiv); setTimeout(() => { input.classList.remove('input-error'); if(errorDiv.parentElement) errorDiv.remove(); }, 4000); }
            document.getElementById('loginPasswordToggle').addEventListener('click', toggleLoginPassword);
            document.getElementById('signupPasswordToggle').addEventListener('click', toggleSignupPassword);
            const highlightTerms = document.getElementById('highlightPrivacy'); const highlightPolicy = document.getElementById('highlightPolicy'); const viewTermsBtn = document.getElementById('viewTerms');
            const openTermsModal = () => showTermsModal();
            if (highlightTerms) highlightTerms.addEventListener('click', openTermsModal); if (highlightPolicy) highlightPolicy.addEventListener('click', openTermsModal); if (viewTermsBtn) viewTermsBtn.addEventListener('click', openTermsModal);
            document.getElementById('loginBtn').addEventListener('click', async () => { const username = document.getElementById('loginUsername').value.trim(); const password = document.getElementById('loginPassword').value; if(!username || !password){ showError('loginUsername','Enter credentials'); return; } const btn = document.getElementById('loginBtn'); btn.innerHTML = '<span class="spinner"></span> Logging in...'; btn.disabled=true; try{ const q = query(collection(db,"users"), where("username","==",username)); const snap=await getDocs(q); if(snap.empty){ showError('loginUsername','Username not found'); btn.innerHTML='Login'; btn.disabled=false; return; } const userData = snap.docs[0].data(); const email = userData.email; const cred=await signInWithEmailAndPassword(auth, email, password); currentUser=cred.user; await updateUserBalance(); renderDashboard(); } catch(e){ showError('loginPassword','Invalid credentials'); btn.innerHTML='Login'; btn.disabled=false; } });
            const emailInput = document.getElementById('signupEmail'); const usernameInput = document.getElementById('signupUsername'); const referralInput = document.getElementById('referralCode'); const emailErrorMsg = document.getElementById('emailErrorMsg'); const usernameErrorMsg = document.getElementById('usernameErrorMsg'); const referralErrorMsg = document.getElementById('referralErrorMsg');
            usernameInput.addEventListener('input', (e) => { e.target.value = e.target.value.replace(/\s/g, ''); });
            usernameInput.addEventListener('blur', async () => { const username = usernameInput.value.trim(); if (!username) return; if (username.includes(' ')) { usernameErrorMsg.style.display = 'block'; usernameErrorMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> Username cannot contain spaces!'; usernameInput.classList.add('input-error'); return; } try { const usersRef = collection(db, "users"); const q = query(usersRef, where("username", "==", username)); const querySnapshot = await getDocs(q); if (!querySnapshot.empty) { usernameErrorMsg.style.display = 'block'; usernameErrorMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> Username already taken!'; usernameInput.classList.add('input-error'); } else { usernameErrorMsg.style.display = 'none'; usernameInput.classList.remove('input-error'); usernameInput.classList.add('input-success'); setTimeout(() => usernameInput.classList.remove('input-success'), 2000); } } catch (error) { console.error("Username check error:", error); } });
            emailInput.addEventListener('input', (e) => { emailErrorMsg.style.display = 'none'; emailInput.classList.remove('input-error'); });
            emailInput.addEventListener('blur', async () => { const email = emailInput.value.trim(); if (!email) return; if (!isValidEmail(email)) { emailErrorMsg.style.display = 'block'; emailErrorMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please enter a valid email address!'; emailInput.classList.add('input-error'); return; } try { const emailExists = await checkEmailExists(email); if (emailExists) { emailErrorMsg.style.display = 'block'; emailErrorMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> Email already registered!'; emailInput.classList.add('input-error'); } else { emailErrorMsg.style.display = 'none'; emailInput.classList.remove('input-error'); emailInput.classList.add('input-success'); setTimeout(() => emailInput.classList.remove('input-success'), 2000); } } catch (error) { console.error("Email check error:", error); } });
            referralInput.addEventListener('blur', async () => { const code = referralInput.value.trim(); if (!code) { referralErrorMsg.style.display = 'none'; return; } try { const usersRef = collection(db, "users"); const q = query(usersRef, where("referralCode", "==", code)); const querySnapshot = await getDocs(q); if (querySnapshot.empty) { referralErrorMsg.style.display = 'block'; referralErrorMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid referral code!'; referralInput.classList.add('input-error'); } else { referralErrorMsg.style.display = 'none'; referralInput.classList.remove('input-error'); referralInput.classList.add('input-success'); setTimeout(() => referralInput.classList.remove('input-success'), 2000); } } catch (error) { console.error("Referral check error:", error); } });
            document.getElementById('forgotPasswordLink').addEventListener('click', showForgotPasswordModal);
            document.getElementById('switchToSignup').addEventListener('click', (e) => { e.preventDefault(); document.getElementById('loginForm').style.display='none'; document.getElementById('signupForm').style.display='block'; document.getElementById('loginTab').classList.remove('active'); document.getElementById('signupTab').classList.add('active'); });
            document.getElementById('switchToLogin').addEventListener('click', (e) => { e.preventDefault(); document.getElementById('signupForm').style.display='none'; document.getElementById('loginForm').style.display='block'; document.getElementById('signupTab').classList.remove('active'); document.getElementById('loginTab').classList.add('active'); });
            document.getElementById('loginTab').addEventListener('click', () => { document.getElementById('signupForm').style.display='none'; document.getElementById('loginForm').style.display='block'; document.getElementById('signupTab').classList.remove('active'); document.getElementById('loginTab').classList.add('active'); });
            document.getElementById('signupTab').addEventListener('click', () => { document.getElementById('loginForm').style.display='none'; document.getElementById('signupForm').style.display='block'; document.getElementById('loginTab').classList.remove('active'); document.getElementById('signupTab').classList.add('active'); });
            document.getElementById('signupBtn').addEventListener('click', async () => {
                const signupBtn = document.getElementById('signupBtn'); let username = usernameInput.value.trim(); const email = emailInput.value.trim(); const password = document.getElementById('signupPassword').value; const repeat = document.getElementById('signupRepeat').value; const referralCode = referralInput.value.trim(); const terms = document.getElementById('termsCheck').checked; username = sanitizeUsername(username);
                if (!username) { showError('signupUsername', 'Username is required!'); return; } if (username.includes(' ')) { showError('signupUsername', 'Username cannot contain spaces!'); return; } if (!email) { showError('signupEmail', 'Email is required!'); return; } if (!isValidEmail(email)) { showError('signupEmail', 'Please enter a valid email address!'); return; } if (password.length < 6) { showError('signupPassword', 'Password must be at least 6 characters!'); return; } if (password !== repeat) { showError('signupRepeat', 'Passwords do not match!'); return; } if (!terms) { showActionPopup("Please accept Terms & Conditions and Privacy Policy", 'error'); return; }
                const emailExists = await checkEmailExists(email); if (emailExists) { showError('signupEmail', 'Email already registered!'); return; }
                signupBtn.innerHTML = '<span class="spinner"></span> Creating Account...'; signupBtn.disabled = true;
                try {
                    const usersRef = collection(db, "users"); const usernameQuery = query(usersRef, where("username", "==", username)); const usernameExists = await getDocs(usernameQuery);
                    if (!usernameExists.empty) { showError('signupUsername', 'Username already taken!'); signupBtn.innerHTML = 'Create Account'; signupBtn.disabled = false; return; }
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password); const newUser = userCredential.user; const newReferralCode = generateReferralCode(username);
                    await setDoc(doc(db, "users", newUser.uid), { uid: newUser.uid, username: username, email: email, takcoin: 0, totalTaps: 0, referralBalance: 0, referralCode: newReferralCode, referredBy: referralCode || null, createdAt: serverTimestamp() });
                    if (referralCode) { const referrerQuery = query(collection(db, "users"), where("referralCode", "==", referralCode)); const referrerSnapshot = await getDocs(referrerQuery); if (!referrerSnapshot.empty) { const referrerId = referrerSnapshot.docs[0].id; await processReferralBonus(referrerId, newUser.uid); } }
                    currentUser = newUser; await updateUserBalance(); renderDashboard();
                } catch (error) { console.error("Signup error:", error); if (error.code === 'auth/email-already-in-use') { showError('signupEmail', 'Email already registered!'); } else if (error.code === 'auth/weak-password') { showError('signupPassword', 'Password is too weak!'); } else { showError('signupEmail', error.message || 'Signup failed. Please try again.'); } signupBtn.innerHTML = 'Create Account'; signupBtn.disabled = false; }
            });
        }
        
        onAuthStateChanged(auth, async (user) => { 
            if(user){ 
                currentUser = user; 
                if (userDataUnsubscribe) { userDataUnsubscribe(); userDataUnsubscribe = null; }
                setupUserDataListener(user.uid);
                setupRealtimeNotificationListener(user.uid);
                setupWithdrawalRefundListener(user.uid);
                setTimeout(() => { if (currentUserData) { renderDashboard(); } else { setTimeout(() => { if (currentUserData) { renderDashboard(); } else { renderAuth(); } }, 1000); } }, 500);
            } else { 
                if (userDataUnsubscribe) { userDataUnsubscribe(); userDataUnsubscribe = null; }
                if (notificationUnsubscribe) { notificationUnsubscribe(); notificationUnsubscribe = null; }
                if (leaderboardUnsubscribe) { leaderboardUnsubscribe(); leaderboardUnsubscribe = null; }
                renderAuth(); 
            } 
        });
    </script>
